<!DOCTYPE html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>
    {% if page.title and page.title != site.title %}
      {{ page.title }} · {{ site.title }}
    {% else %}
      {{ site.title }} · {{ site.tagline }}
    {% endif %}
  </title>
  <meta name="description" content="{{ page.description | default: site.description | strip_html | truncate: 160 }}">
  <link rel="preconnect" href="https://avatars.githubusercontent.com" crossorigin>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% seo %}
</head>
<body>
  <div class="bg-aurora" id="bg-aurora" aria-hidden="true">
    <span class="bg-vignette"></span>
    <span class="bg-orb bg-orb-a"></span>
    <span class="bg-orb bg-orb-b"></span>
    <span class="bg-orb bg-orb-c"></span>
    <span class="bg-orb bg-orb-d"></span>
    <span class="bg-orb bg-orb-e"></span>
    <span class="bg-ring bg-ring-a"></span>
    <span class="bg-ring bg-ring-b"></span>
    <span class="bg-beam bg-beam-a"></span>
    <span class="bg-beam bg-beam-b"></span>
    <span class="bg-grid"></span>
    <span class="bg-stars" id="bg-stars"></span>
    <span class="bg-meteors" id="bg-meteors"></span>
    <span class="bg-spotlight" id="bg-spotlight"></span>
    <span class="bg-scan"></span>
    <span class="bg-noise"></span>
  </div>
  <div class="site-shell">
    {% include nav.html %}
    <main class="site-main">
      {{ content }}
    </main>
    {% include footer.html %}
  </div>
  <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
</body>
</html>
