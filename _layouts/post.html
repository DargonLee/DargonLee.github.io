---
layout: default
---

<article class="container">
  <header class="page-hero">
    <h1>{{ page.title }}</h1>
    <div class="meta">
      <span>{{ page.date | date: "%Y-%m-%d" }}</span>
      {% if page.tags %}
        <span>
          {% for tag in page.tags %}
            #{{ tag }}{% unless forloop.last %} · {% endunless %}
          {% endfor %}
        </span>
      {% endif %}
    </div>
  </header>
  <div class="prose">
    {{ content }}
  </div>
</article>
